{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}学習記録アプリ{% endblock %}</title>
    
    <!-- manifest.json を読み込む -->
    <link rel="manifest" href="{% static 'records/manifest.json' %}">
    
    <!-- テーマカラーを設定 -->
    <meta name="theme-color" content="#007bff">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- ヘッダー -->
    <header class="bg-blue-600 text-white shadow-md">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold">📚 学習記録アプリ</h1>
                <div class="space-x-4">
                    <a href="{% url 'records:list' %}" class="hover:text-blue-200 transition">一覧</a>
                    <a href="{% url 'records:create' %}" class="bg-white text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-50 transition">新規作成</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- メインコンテンツ -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <!-- フッター -->
    <footer class="bg-gray-800 text-white text-center py-4 mt-auto">
        <p>&copy; 2026 学習記録アプリ</p>
    </footer>

    <!-- Service Worker の登録 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then((registration) => {
                        console.log('Service Worker 登録成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Service Worker 登録失敗:', error);
                    });
            });
        }
    </script>
</body>
</html>
