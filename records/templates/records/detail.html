{% extends "records/base.html" %}

{% block title %}学習記録の詳細{% endblock %}

{% block content %}
<h1>学習記録の詳細</h1>

<div class="record-detail">
    <h2>{{ record.title }}</h2>
    
    <div class="record-info">
        <p><strong>学習日：</strong>{{ record.date }}</p>
        <p><strong>学習時間：</strong>{{ record.hours }}時間</p>
    </div>
    
    <div class="record-content">
        <h3>学習内容</h3>
        <p>{{ record.content }}</p>
    </div>
    
    <div class="actions">
        <a href="{% url 'records:list' %}">一覧に戻る</a>
        <a href="{% url 'records:edit' record.pk %}">編集</a>
        <form method="post" action="{% url 'records:delete' record.pk %}" style="display: inline;">
            {% csrf_token %}
            <button type="submit" onclick="return confirm('本当に削除しますか？')">削除</button>
        </form>
    </div>
</div>

{% endblock %}
