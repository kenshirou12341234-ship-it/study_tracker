
{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-4">{{ record.title }}</h1>
        
        <div class="flex items-center text-gray-600 mb-6 space-x-4">
            <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full">📅 {{ record.date }}</span>
            <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full">⏱️ {{ record.hours }}時間</span>
        </div>
        
        <div class="border-t pt-6">
            <h2 class="text-lg font-bold text-gray-700 mb-2">学習内容</h2>
            <p class="text-gray-700 whitespace-pre-line">{{ record.content }}</p>
        </div>
        
        <div class="flex space-x-3 mt-8">
            <a href="{% url 'records:list' %}" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 transition">一覧に戻る</a>
            <a href="{% url 'records:edit' record.pk %}" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition">編集</a>
            <a href="{% url 'records:delete' record.pk %}" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">削除</a>
        </div>
    </div>
</div>
